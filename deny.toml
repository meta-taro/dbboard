# cargo-deny configuration for dbboard.
#
# Runs four checks: advisories, licenses, bans, sources.
# Invoke via `cargo deny check` (see README "Security checks").
# Schema: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Add entries here to silence a specific RustSec advisory. Each entry
# must include `reason` so future readers know why.
ignore = [
    # Unmaintained (not a vulnerability). Pulled by i18n-embed-fl (a
    # build-time proc-macro) -> age -> dbboard-config. It runs only during
    # compilation, never at runtime, and there is no upstream fix: both
    # proc-macro-error and this fork are abandoned and i18n-embed-fl has
    # not migrated. No runtime exposure, so tracked rather than blocked.
    { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2: build-time-only transitive dep of i18n-embed-fl; no runtime exposure, no upstream fix" },
    # quick-xml 0.39.x DoS pair (quadratic attribute scan / unbounded
    # namespace allocation). Reached ONLY through wayland-scanner, a
    # Linux-only build-time proc-macro that parses the Wayland protocol
    # XML bundled inside the crate to generate code. The parsed XML is
    # trusted, fixed, build-time input — never network or user data — so
    # neither DoS vector is reachable. wayland-scanner pins ^0.39, so the
    # >=0.41 fix cannot be pulled in without an upstream (eframe/winit)
    # bump. Re-check when the GUI stack updates.
    { id = "RUSTSEC-2026-0194", reason = "quick-xml: Linux-only build-time XML codegen (wayland-scanner) over trusted bundled input; DoS vector unreachable, pinned by upstream ^0.39" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml: Linux-only build-time XML codegen (wayland-scanner) over trusted bundled input; DoS vector unreachable, pinned by upstream ^0.39" },
]

[licenses]
version = 2
# SPDX expressions allowed across the entire dependency graph. Every
# entry is required by at least one crate in the current lock file; the
# `license-not-encountered` warning surfaces dead allowances on the next
# check, so trim this list whenever a dep is removed.
allow = [
    "MIT",                  # the workspace default; ubiquitous
    "Apache-2.0",           # ubiquitous (sqlx, tokio, axum, …)
    "Apache-2.0 WITH LLVM-exception", # rustls / wasi
    "BSD-2-Clause",         # arrayref, etc.
    "BSD-3-Clause",         # subtle, encoding_rs, …
    "ISC",                  # libloading, untrusted, …
    "Zlib",                 # tinyvec
    "Unicode-3.0",          # unicode-ident (newer crates)
    "Unlicense",            # byteorder
    "BSL-1.0",              # clipboard-win / error-code (Boost SL, permissive)
    "OFL-1.1",              # epaint_default_fonts bundles SIL Open Font License fonts
    "Ubuntu-font-1.0",      # epaint_default_fonts bundles the Ubuntu font
    "MPL-2.0",              # option-ext (via directories/dirs-sys): file-level weak copyleft, fine to redistribute unmodified in a binary
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Path dependencies inside this workspace use `version = "*"` by
# convention; only deny wildcards on third-party crates.
allow-wildcard-paths = true
# Crates that should never end up in the dep tree. Empty for now; add
# entries with `reason` when a known-bad crate is identified.
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
